<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="publisher" content="Jonathan Robert Pool">
    <meta name="creator" content="Jonathan Robert Pool">
    <meta name="keywords" content="report,accessibility,a11y">
    <title>Test a web page | Kilotest</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main>
      <h1>Test a web page with <a href="/">Kilotest</a></h1>
      <p>Which page do you want to test? (Both answers are required.)</p>
      <form id="form" method="post" action="/test/progress.html">
        <p><label>
          URL of the web page, starting with <code>https://</code> (required)
          <input type="url" name="pageURL" size="80" maxLength="300" required>
        </label></p>
        <p><label>
          Description of the page, e.g., ACM home (required)
          <input type="text" name="pageWhat" size="60" maxLength="60" required>
        </label></p>
        <p><label>
          Authorization code to override rate limit (optional)
          <input type="text" name="authCode" size="3" maxLength="3">
        </label></p>
        <p><button id="submit">Submit</button></p>
        <div id="status" role="status"></div>
      </form>
    </main>
  </body>
</html>
