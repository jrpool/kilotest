<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="publisher" content="Jonathan Robert Pool">
    <meta name="creator" content="Jonathan Robert Pool">
    <meta name="keywords" content="report,accessibility,a11y">
    <title>Test order | Kilotest</title>
    <link rel="icon" href="/favicon.ico">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main>
      <h1><a href="/">Kilotest</a>: Test order</h1>
      <p>To add a page to the queue for testing, you must select one of the following recommendations and enter your authorization code as a Kilotest manager.</p>
      <p>If the page is not yet recommended, first <a href="targets.html">recommend it</a>.</p>
      <form action="/testOrder.html" method="post">
        <fieldset>
          <legend>Recommendations</legend>
          <ul>
            __recs__
          </ul>
          <p>__noRecs__</p>
        </fieldset>
        <p><label>
          Authorization code: <input size="3" minLength="3" maxlength="3" name="authCode" required>
        </label></p>
        <p><button type="submit"__disabled__>Submit</button></p>
      </form>
    </main>
  </body>
</html>
